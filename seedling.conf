# =============================================================================
# seedling.conf -- deployment configuration for this copy of seedling.
#
# Every setting seedling applies at install time is listed below with its
# default value filled in. A standard install from the internet uses these
# exact values, so if that's you, there is nothing to change here.
#
# ORGANIZATIONS (self-hosted git, air-gapped networks, shared drives):
# replace the value between the quotes on any line below, then distribute
# your copy of this repo. Everyone who installs from it picks your values
# up automatically -- no flags or environment variables for your users.
#
# Format: KEY="value", one per line. This file is read by
# installers/install.sh (sourced) and installers/install.ps1 (parsed), so
# keep values as plain quoted strings with no shell logic.
# =============================================================================

# -----------------------------------------------------------------------------
# Where seedling is installed from, and where `seed update-commands`
# fetches updates (re-downloaded on demand -- no git checkout lives inside
# ~/seedling). Accepts either:
#   - a git URL          e.g. "https://github.mycompany.com/tools/seedling.git"
#   - a directory path   e.g. "S:\shared\seedling" or "/mnt/tools/seedling"
#     (a copy of this repo on a network drive -- no git hosting needed)
# The SEEDLING_REPO environment variable still overrides this for one run.
# -----------------------------------------------------------------------------
SEEDLING_REPO_URL="https://github.com/cryocliff/seedling.git"

# -----------------------------------------------------------------------------
# The folder everything seedling manages lives in: interpreters, venvs,
# VS Code, cloned repos, config, logs -- all of it. "~" means the user's
# home directory. The SEEDLING_HOME environment variable still overrides
# this for one run.
# -----------------------------------------------------------------------------
SEEDLING_HOME_DIR="~/seedling"

# -----------------------------------------------------------------------------
# Packages installed into every venv `seed venv` creates. Comma-separated.
# Users can change this later with `seed config set venv_default_packages`
# or skip it per-venv with `seed venv <name> --no-default-packages`.
# -----------------------------------------------------------------------------
SEEDLING_VENV_DEFAULT_PACKAGES="ipython,ruff,ipykernel"

# -----------------------------------------------------------------------------
# After installing seedling itself, also set up a ready-to-use default
# environment: the newest stable Python, plus a venv named "dev" (with the
# default packages above) that every new shell auto-activates. Set to "no"
# to install seedling bare instead. The SEEDLING_AUTO_SETUP environment
# variable still overrides this for one run.
# -----------------------------------------------------------------------------
SEEDLING_AUTO_SETUP="yes"

# -----------------------------------------------------------------------------
# Also download and set up the portable VS Code (with the Python/Jupyter/
# Ruff extensions) as part of the install, so `seed vscode` opens instantly
# instead of downloading on first use. Only applies when SEEDLING_AUTO_SETUP
# is "yes". Set to "no" to skip (it's the largest download, ~130 MB). The
# SEEDLING_AUTO_VSCODE environment variable still overrides this for one run.
# -----------------------------------------------------------------------------
SEEDLING_AUTO_VSCODE="yes"

# =============================================================================
# OFFLINE / AIR-GAPPED NETWORKS (see docs/OFFLINE.md)
# The two settings below are all an organization edits to make Python
# installs and package installs work with no internet. Empty (the default)
# means "use the internet normally". Both are recorded in seedling's
# settings at install time and applied automatically to every command --
# users never set environment variables themselves.
# =============================================================================

# -----------------------------------------------------------------------------
# Where `seed python` downloads interpreter builds from. Either a URL of an
# internal mirror, or a plain directory (e.g. a network share) holding
# python-build-standalone release archives:
#   SEEDLING_PYTHON_MIRROR="https://mirror.mycompany.com/pbs"
#   SEEDLING_PYTHON_MIRROR="S:\tools\python-builds"
# -----------------------------------------------------------------------------
SEEDLING_PYTHON_MIRROR=""

# -----------------------------------------------------------------------------
# Where packages install from (`seed venv` defaults, `seed install`, and
# building seedling itself -- so it must include `hatchling` plus the
# default venv packages above). Either an index URL (Artifactory / Nexus /
# devpi), or a plain directory of wheel files (e.g. a network share; the
# internet index is then disabled entirely):
#   SEEDLING_PACKAGE_INDEX="https://pypi.mycompany.com/simple"
#   SEEDLING_PACKAGE_INDEX="S:\tools\wheels"
# -----------------------------------------------------------------------------
SEEDLING_PACKAGE_INDEX=""

# -----------------------------------------------------------------------------
# HTTPS trust for internal mirrors/indexes signed by a corporate CA.
# Two independent options; use whichever fits how your organization
# distributes its CA:
#   - Set to "yes" to trust the OPERATING SYSTEM's certificate store
#     (right when IT installs the corporate CA machine-wide via policy).
#   - Or ship the CA itself with this repo: drop .pem/.crt files into a
#     vendor/certs/ folder next to this file -- the installer bundles and
#     trusts them automatically on every machine (uv, git, and seedling's
#     own downloads). No setting needed for that; presence is enough.
# -----------------------------------------------------------------------------
SEEDLING_NATIVE_TLS=""
