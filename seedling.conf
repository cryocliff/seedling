# =============================================================================
# seedling.conf -- deployment configuration for this copy of seedling.
#
# Every setting seedling applies at install time is listed below with its
# default value filled in. A standard install from the internet uses these
# exact values, so if that's you, there is nothing to change here.
#
# ORGANIZATIONS (self-hosted git, air-gapped networks, shared drives):
# replace the value between the quotes on any line below, then distribute
# your copy of this repo. Everyone who installs from it picks your values
# up automatically -- no flags or environment variables for your users.
#
# Format: KEY="value", one per line. This file is read by
# installers/install.sh (sourced) and installers/install.ps1 (parsed), so
# keep values as plain quoted strings with no shell logic.
# =============================================================================

# -----------------------------------------------------------------------------
# Where seedling is installed from, and where `seed update-commands`
# fetches updates (re-downloaded on demand -- no git checkout lives inside
# ~/seedling). Accepts either:
#   - a git URL          e.g. "https://github.mycompany.com/tools/seedling.git"
#   - a directory path   e.g. "S:\shared\seedling" or "/mnt/tools/seedling"
#     (a copy of this repo on a network drive -- no git hosting needed)
# The SEEDLING_REPO environment variable still overrides this for one run.
# -----------------------------------------------------------------------------
SEEDLING_REPO_URL="https://github.com/cryocliff/seedling.git"

# -----------------------------------------------------------------------------
# The folder everything seedling manages lives in: interpreters, venvs,
# VS Code, cloned repos, config, logs -- all of it. "~" means the user's
# home directory. The SEEDLING_HOME environment variable still overrides
# this for one run.
#
# Installing to a SHARED location (a drive or folder several users share)?
# Put the "{user}" token in the path -- it expands to each installer's own
# login name, so everyone gets a private, conflict-free folder:
#   SEEDLING_HOME_DIR="C:\seedling\{user}"   ->  C:\seedling\alice, C:\seedling\bob, ...
# -----------------------------------------------------------------------------
SEEDLING_HOME_DIR="~/seedling"

# -----------------------------------------------------------------------------
# Packages installed into every venv `seed venv` creates. Comma-separated.
# Users can change this later with `seed config set venv_default_packages`
# or skip it per-venv with `seed venv <name> --no-default-packages`.
# -----------------------------------------------------------------------------
SEEDLING_VENV_DEFAULT_PACKAGES="ipython,ruff,ipykernel"

# -----------------------------------------------------------------------------
# After installing seedling itself, also set up a ready-to-use default
# environment: the newest stable Python, plus a venv named "dev" (with the
# default packages above) that every new shell auto-activates. Set to
# "false" to install seedling bare instead. The SEEDLING_AUTO_SETUP
# environment variable still overrides this for one run.
# -----------------------------------------------------------------------------
SEEDLING_AUTO_SETUP="true"

# -----------------------------------------------------------------------------
# Also download and set up the portable VS Code (with the Python/Jupyter/
# Ruff extensions) as part of the install, so `seed vscode` opens instantly
# instead of downloading on first use. Only applies when SEEDLING_AUTO_SETUP
# is "true". Set to "false" to skip (it's the largest download, ~130 MB). The
# SEEDLING_AUTO_VSCODE environment variable still overrides this for one run.
# -----------------------------------------------------------------------------
SEEDLING_AUTO_VSCODE="true"

# =============================================================================
# OFFLINE / AIR-GAPPED NETWORKS (see docs/OFFLINE.md)
# The two settings below are all an organization edits to make Python
# installs and package installs work with no internet. Empty (the default)
# means "use the internet normally". Both are recorded in seedling's
# settings at install time and applied automatically to every command --
# users never set environment variables themselves.
# =============================================================================

# -----------------------------------------------------------------------------
# Where `seed python` downloads interpreter builds from. Either a URL of an
# internal mirror, or a plain directory (e.g. a network share) holding
# python-build-standalone release archives:
#   SEEDLING_PYTHON_MIRROR="https://mirror.mycompany.com/pbs"
#   SEEDLING_PYTHON_MIRROR="S:\tools\python-builds"
# -----------------------------------------------------------------------------
SEEDLING_PYTHON_MIRROR=""

# -----------------------------------------------------------------------------
# Where packages install from (`seed venv` defaults, `seed install`, and
# building seedling itself -- so it must include `hatchling` plus the
# default venv packages above). Either an index URL (Artifactory / Nexus /
# devpi), or a plain directory of wheel files (e.g. a network share; the
# internet index is then disabled entirely):
#   SEEDLING_PACKAGE_INDEX="https://pypi.mycompany.com/simple"
#   SEEDLING_PACKAGE_INDEX="S:\tools\wheels"
# -----------------------------------------------------------------------------
SEEDLING_PACKAGE_INDEX=""

# -----------------------------------------------------------------------------
# HTTPS trust for internal mirrors/indexes signed by a corporate CA.
# Two independent options; use whichever fits how your organization
# distributes its CA:
#   - Set to "true" to trust the OPERATING SYSTEM's certificate store
#     (right when IT installs the corporate CA machine-wide via policy).
#   - Or ship the CA itself with this repo: drop .pem/.crt files into a
#     vendor/certs/ folder next to this file -- the installer bundles and
#     trusts them automatically on every machine (uv, git, and seedling's
#     own downloads). No setting needed for that; presence is enough.
# -----------------------------------------------------------------------------
SEEDLING_NATIVE_TLS="false"

# -----------------------------------------------------------------------------
# Which editor build `seed vscode` installs:
#   "microsoft"  the official Visual Studio Code build (the default).
#   "vscodium"   the MIT-licensed community build of the same source.
#
# This is a LICENSING choice as much as a technical one. The official build
# is distributed under Microsoft's proprietary licence, and its extensions
# come from the Microsoft Marketplace under separate terms -- both of which
# restrict redistribution. If you are staging an offline bundle onto a share
# (see docs/OFFLINE.md), you are redistributing whatever you pick here.
# VSCodium and Open VSX are openly licensed and carry no such restriction.
#
# The tradeoff is Pylance: it is proprietary, licensed to run only in
# official Microsoft products, and therefore unavailable on Open VSX. Under
# "vscodium" the Python extension falls back to its bundled Jedi language
# server -- completions and type checking are noticeably weaker.
# -----------------------------------------------------------------------------
SEEDLING_VSCODE_FLAVOR="microsoft"

# -----------------------------------------------------------------------------
# Where the editor installs extensions from. Empty means the chosen flavor's
# own default -- the Microsoft Marketplace for "microsoft", Open VSX for
# "vscodium" -- which is what you want unless you run an internal mirror.
#
# Give the BASE url; the gallery and item endpoints are derived from it:
#   SEEDLING_EXTENSION_GALLERY="https://open-vsx.org/vscode"
#   SEEDLING_EXTENSION_GALLERY="https://openvsx.mycompany.com/vscode"
#
# Setting this on the "microsoft" flavor rewrites product.json inside the
# official build -- i.e. it modifies a proprietary binary. Prefer switching
# SEEDLING_VSCODE_FLAVOR to "vscodium", which already points at Open VSX.
# -----------------------------------------------------------------------------
SEEDLING_EXTENSION_GALLERY=""

# -----------------------------------------------------------------------------
# Extensions installed into a fresh editor. Comma-separated. Empty means the
# built-in starter kit for the chosen flavor (Python, Jupyter, Ruff,
# EditorConfig, rainbow-csv -- plus Pylance on "microsoft"). This is where a
# team standardizes its editor setup:
#   SEEDLING_VSCODE_EXTENSIONS="ms-python.python,charliermarsh.ruff"
# Set to "none" to install no extensions at all.
# -----------------------------------------------------------------------------
SEEDLING_VSCODE_EXTENSIONS=""

# -----------------------------------------------------------------------------
# A deployment PROFILE: one TOML file describing the environment your users
# should end up with -- interpreters, named venvs and their packages, repos to
# clone, and settings. Path is relative to this repo copy (or absolute).
#
#   SEEDLING_PROFILE="seedling-profile.toml"
#
# When set, the installer applies it instead of creating the default single
# "dev" venv: the profile becomes the definition of a standard environment.
# Users can re-apply it later with `seed apply` to pick up your changes --
# it only adds what's missing and never deletes or recreates anything.
#
# Start one with `seed apply --preview` against a draft, or copy the example
# in docs/PROFILES.md. Empty means the built-in default setup.
#
# Users can also point the ordinary one-line installer at their own profile
# without a distributed copy of this repo, via the SEEDLING_PROFILE
# ENVIRONMENT variable (which overrides this setting for one run):
#   curl -fsSL .../install.sh | SEEDLING_PROFILE=./team.toml sh
# Unlike this setting, a path given that way must exist -- the install stops
# rather than quietly falling back to the default environment.
# -----------------------------------------------------------------------------
SEEDLING_PROFILE=""
