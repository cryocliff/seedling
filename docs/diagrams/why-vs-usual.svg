<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Getting started with Python: the usual way (hours of setup) versus seedling (one command)">
  <metadata id="mermaid-source" data-encoding="base64"></metadata>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8a8a8a"/>
    </marker>
  </defs>
  <path d="M380,68 V100 H200 V156" fill="none" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M380,68 V100 H570 V156" fill="none" stroke="#8a8a8a" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="22" width="220" height="46" rx="8" fill="#22304a" stroke="#4a77aa" stroke-width="2"/>
  <text x="380" y="50" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">Getting started with Python</text>
  <rect x="30" y="158" width="340" height="112" rx="8" fill="#3a2020" stroke="#aa3a3a" stroke-width="2"/>
  <text x="200" y="194" text-anchor="middle" fill="#fff" font-size="13">
    <tspan x="200">research, install, and connect several tools —</tspan>
    <tspan x="200" dy="22">hours of setup and decisions</tspan>
    <tspan x="200" dy="22">before your first line of code</tspan>
  </text>
  <rect x="410" y="158" width="320" height="90" rx="8" fill="#1f3a24" stroke="#3aaa5a" stroke-width="2"/>
  <text x="570" y="196" text-anchor="middle" fill="#fff" font-size="13">
    <tspan x="570">run one command → open a terminal →</tspan>
    <tspan x="570" dy="22">you're writing Python</tspan>
  </text>
  <text x="200" y="132" text-anchor="middle" fill="#24292f" stroke="#fff" stroke-width="3" paint-order="stroke" stroke-linejoin="round" font-size="12" font-weight="bold">The usual way</text>
  <text x="570" y="132" text-anchor="middle" fill="#24292f" stroke="#fff" stroke-width="3" paint-order="stroke" stroke-linejoin="round" font-size="12" font-weight="bold">With seedling</text>
</svg>
