name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; a new push cancels the previous one.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint is platform- and interpreter-independent, so it runs once rather than
  # across the test matrix. seedling ships ruff to its users (default venv
  # package, default VS Code extension and formatter), so the source it ships
  # from is held to the same bar. Rules live in ruff.toml at the repo root.
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run ruff
        run: uvx ruff check .

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is the primary target; Linux proves the cross-platform
        # (bash installer, POSIX paths) code paths.
        #
        # EVERY currently-supported Python from the requires-python floor (3.12)
        # upward -- not just the ends -- so a stdlib change lands here before it
        # reaches users (the tarfile extraction-filter change is the case that
        # prompted this). Betas are deliberately excluded: add the next version
        # here when it reaches its first stable release, and raise the floor in
        # src/pyproject.toml + ruff.toml when one goes end-of-life.
        os: [windows-latest, ubuntu-latest]
        python: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      # uv provides both the test runner (uvx pytest) and the interpreter
      # under test (--python), and is what seedling itself shells out to, so
      # the needs_uv tests exercise the real thing.
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Runners already ship git, bash (git-bash on Windows), and PowerShell,
      # so the needs_git / needs_bash / needs_powershell tests run rather than
      # skip. (On Linux only pwsh exists, not `powershell`, so the three
      # PowerShell tests skip there by design.)
      - name: Run tests
        run: uvx --python ${{ matrix.python }} pytest -q
